  <text x="868" y="494" fill="#a16207" font-size="18" font-family="Helvetica Neue, Arial, sans-serif" font-weight="600">shopify</text>
  <rect x="981" y="468" width="141" height="40" rx="20" fill="rgba(161, 98, 7, 0.1)" stroke="rgba(161, 98, 7, 0.28)" />
  <text x="999" y="494" fill="#a16207" font-size="18" font-family="Helvetica Neue, Arial, sans-serif" font-weight="600">ecommerce</text>
  <rect x="1134" y="468" width="207" height="40" rx="20" fill="rgba(161, 98, 7, 0.1)" stroke="rgba(161, 98, 7, 0.28)" />
  <text x="1152" y="494" fill="#a16207" font-size="18" font-family="Helvetica Neue, Arial, sans-serif" font-weight="600">email marketing</text>
  <rect x="1353" y="468" width="185" height="40" rx="20" fill="rgba(161, 98, 7, 0.1)" stroke="rgba(161, 98, 7, 0.28)" />
  <text x="1371" y="494" fill="#a16207" font-size="18" font-family="Helvetica Neue, Arial, sans-serif" font-weight="600">sms marketing</text>
  <text x="850" y="540" fill="#6c5f54" font-size="20" font-family="Helvetica Neue, Arial, sans-serif">github + pages + tracked CTA links</text>
