<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">Shopify Brands Running Klaviyo Without SMS</title>
  <desc id="desc">Lists of Shopify brands already using Klaviyo email but still missing a visible SMS layer.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8f2e8" />
      <stop offset="52%" stop-color="#f1eadf" />
      <stop offset="100%" stop-color="#ece4d9" />
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.96)" />
      <stop offset="100%" stop-color="rgba(255,251,245,0.92)" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="32" flood-color="rgba(34,25,18,0.12)" />
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)" />
  <circle cx="1060" cy="112" r="180" fill="rgba(161, 98, 7, 0.18)" />
  <circle cx="1170" cy="504" r="164" fill="rgba(161, 98, 7, 0.35)" />
  <circle cx="212" cy="548" r="118" fill="rgba(255,255,255,0.55)" />

  <rect x="54" y="52" width="1172" height="536" rx="36" fill="url(#panel)" stroke="rgba(29,23,18,0.10)" filter="url(#shadow)" />
  <rect x="82" y="82" width="204" height="38" rx="19" fill="#a16207" opacity="0.14" />
  <text x="104" y="107" fill="rgba(161, 98, 7, 0.92)" font-size="19" font-family="Helvetica Neue, Arial, sans-serif" font-weight="700" letter-spacing="1.8">ENRICHANYTHING</text>

  <text x="92" y="166" fill="#1c1712" font-size="68" font-family="Helvetica Neue, Arial, sans-serif" font-weight="700">
