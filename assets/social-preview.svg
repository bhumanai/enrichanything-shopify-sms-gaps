  <text x="850" y="350" fill="rgba(161, 98, 7, 0.92)" font-size="20" font-family="Helvetica Neue, Arial, sans-serif" font-weight="700" letter-spacing="1.2">START HERE</text>
  <text x="850" y="394" fill="#1f1713" font-size="26" font-family="Helvetica Neue, Arial, sans-serif">
