name: Refresh Public Assets

on:
  workflow_dispatch:
  schedule:
    - cron: '17 6 * * 1'

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Refresh repo assets
        run: npm run refresh
      - name: Commit changes
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add README.md index.html .nojekyll data repo.config.json markets reports
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Refresh public assets"
          git push

